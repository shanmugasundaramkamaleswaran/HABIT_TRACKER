<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Habit Tracker | Analysis</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="motto">சேவையே உயர்ந்த தர்மமாகும்</div>
        <header>
            <h1>Habit Tracker Pro</h1>
            <p>Unlock your potential through consistent daily action. Track, analyze, and conquer.</p>
            <button id="reset-btn" class="reset-btn" onclick="resetAll()">Reset Progress</button>
        </header>
        
        <main id="tracker-container">
            <div class="loading">Initializing system...</div>
        </main>

        <section class="analysis-section" id="analysis-container">
            <!-- Charts will be injected here -->
             <div class="loading">Calculating performance...</div>
        </section>

        <section class="notes-section">
            <h2>Strategic Reflections</h2>
            <textarea id="notes-box" placeholder="Write your daily notes, insights, or strategies here..." oninput="saveNotes()"></textarea>
        </section>

        <footer>
            <div class="color-bars">
                <div class="bar saffron"></div>
                <div class="bar blue"></div>
                <div class="bar yellow"></div>
                <div class="bar green"></div>
            </div>
            <p>&copy; 2026 Elite Tracker | Powered by Discipline</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
